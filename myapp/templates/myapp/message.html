<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Instagram Clone</title>
  <style>
    body {
      background-color: #0d0d0d;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }
    .tabs {
      display: flex;
      gap: 15px;
      margin-bottom: 10px;
    }
    .tab {
      padding: 8px 16px;
      border-radius: 20px;
      color: black;
      background-color:white;
      cursor: pointer;
    }
    .tab.active {
        color: black;
        background-color:white;
    }
    .chat {
      padding: 10px;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
    }
    .chat img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      margin-right: 10px;
    }
    .chat .name {
      font-weight: bold;
    }
    .chat .time {
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="tabs">
    <div class="tab active">Message</div>
  </div>

  <div class="chat">
    <img src="https://i.pravatar.cc/150?img=3" alt="User">
    <div>
      <div class="name">Raghav Mittal</div>
      <div class="time">Sent 2h ago</div>
    </div>
  </div>

  <div class="chat">
    <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="User">
    <div>
      <div class="name">Tanish</div>
      <div class="time">Sent 3h ago</div>
    </div>
  </div>

  <div class="chat">
    <img src="https://randomuser.me/api/portraits/men/55.jpg" alt="User">
    <div>
      <div class="name">Aryan Singla</div>
      <div class="time">Sent 3h ago</div>
    </div>
    </div>
    <div class="chat">
        <img src="https://api.dicebear.com/6.x/adventurer/svg?seed=Leo"class="name" width="50"; height="50"; border-radius: 50% alt="User"> 
        <div>
          <div class="name">Dhawan Aayushi</div>
    
        </div>
      </div>
      </div>
    
      <div class="chat">
        <img src="https://api.dicebear.com/6.x/pixel-art/svg?seed=Mia"width="50"  class="name" height="50" border-radius: 50% ;border color:white; alt="User">
        <div>
          <div class="name">ਪਰਮਜੀਤ ਸਿੰਘ ਰਾਮਗੜੀਆ</div>
     
        </div>
      </div>
    
      <div class="chat">
        <img src="https://api.dicebear.com/6.x/bottts/svg?seed=Gamer" width="50" height="50" class="name"  border-radius: 50% alt="User">
        <div>
          <div class="name">Chana</div>
        </div>
  </div>

</body>
</html>
